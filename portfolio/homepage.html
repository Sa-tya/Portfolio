<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
<script>

    <style>
        * {
            /* text-align: center; */
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
        }
        body,html {
            height: 100%;
            margin: 0;
        }
        .innerbody{
            background-color: #dbbabd;
            padding: 3% 8%;
            /* text-align: center; */
        }
        img {
            width: 200px;
            border-radius: 0px 40px;
            height: auto;
            margin-bottom: 30px;
        }
        
        .box{
            background-color: rgb(181, 188, 199);
            padding: 60px 0;
            border-radius: 2%;
            /* text-align: center; */
        }
        .para {
            /* background-color: yellowgreen; */
            width: 50%;
            min-width: 250px;
            /* margin: 0 25%; */
            margin: 0 auto;
        }
        p {
            font-family: cursive;
            font-size: 30px;
            text-shadow: 2px 2px white;
            /* min-width: 250px; */
            /* animation: typing 5s steps(100) 1s 1 normal both, blinkTextCursor 500ms steps(100) infinite normal; */
            /* max-width: 500px; */
        }
        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
            }
            @keyframes blinkTextCursor{
  from{border-right-color: rgba(255,255,255,.75);}
  to{border-right-color: transparent;}
}
    </style>
</head>
<body>
    <div id="header"></div>
    <div class="innerbody">
    <h1>PORTFOLIO</h1>
    <div class="box" style="text-align: center;">
        <img src="assets/profile.jpg" alt="">
        <div class="para">
        <p>I am <span>Satya Prakash.</span> I am a web developer and Startup Enthusiastic.</p></div>
    </div>
    </div>
</body>
